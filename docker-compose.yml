services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: tiqc_profiles
      MYSQL_USER: tiqc
      MYSQL_PASSWORD: tiqc
      MYSQL_ROOT_PASSWORD: tiqc-root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
